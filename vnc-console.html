<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VNC Console — VPS Myanmar</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0e14; color: #c5d1e0; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }
  .topbar {
    height: 48px; background: #11151f; border-bottom: 1px solid #1e2532;
    display: flex; align-items: center; gap: 14px; padding: 0 16px;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .mark { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg,#4f6fe3,#8060d4); display: grid; place-items: center; font-weight: 800; font-size: 12px; color: #fff; }
  .title { font-size: 13px; font-weight: 600; }
  .sub { font-size: 11px; color: #6b7689; font-family: 'JetBrains Mono', monospace; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3ddc84; box-shadow: 0 0 8px #3ddc84; animation: blink 2s infinite; }
  @keyframes blink { 50% { opacity: .4; } }
  .spacer { flex: 1; }
  .tbtn {
    background: #1a2030; border: 1px solid #29324a; color: #c5d1e0;
    border-radius: 6px; padding: 6px 11px; font-size: 12px; font-weight: 500; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
  }
  .tbtn:hover { background: #222a3d; }
  .tbtn.danger { color: #ff8087; border-color: #4a2730; }
  .stage { height: calc(100vh - 48px - 30px); display: grid; place-items: center; padding: 24px; position: relative; }
  .screen {
    width: 100%; max-width: 1024px; aspect-ratio: 16/10; background: #05070b;
    border: 1px solid #1e2532; border-radius: 10px; overflow: hidden; position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
    font-family: 'JetBrains Mono', monospace;
  }
  .term { padding: 18px 20px; height: 100%; overflow-y: auto; font-size: 13px; line-height: 1.65; }
  .term .sys { color: #6b7689; }
  .term .ok { color: #3ddc84; }
  .term .warn { color: #ffc46b; }
  .term .cmd { color: #6db3ff; }
  .term .out { color: #c5d1e0; }
  .login-banner { color: #8b96a8; }
  .cursor { display: inline-block; width: 8px; height: 15px; background: #3ddc84; vertical-align: middle; margin-left: 2px; animation: blink 1s steps(1) infinite; }
  .prompt-row { display: flex; align-items: center; }
  .prompt { color: #6db3ff; margin-right: 8px; white-space: nowrap; }
  .cmdinput { flex: 1; background: transparent; border: none; outline: none; color: #c5d1e0; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .statusbar { height: 30px; background: #11151f; border-top: 1px solid #1e2532; display: flex; align-items: center; gap: 16px; padding: 0 16px; font-size: 11px; color: #6b7689; font-family: 'JetBrains Mono', monospace; }
  .overlay-off {
    position: absolute; inset: 0; background: rgba(5,7,11,.92); display: grid; place-items: center; text-align: center;
    backdrop-filter: blur(2px);
  }
  .overlay-off .big { font-size: 15px; font-weight: 700; color: #ffc46b; margin-bottom: 6px; }
  .overlay-off .small { font-size: 12px; color: #8b96a8; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="mark">V</div>
      <div>
        <div class="title">VNC Console</div>
        <div class="sub" id="vmsub">connecting…</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="status"><span class="dot" id="statusdot"></span><span id="statustext">Connected</span></div>
    <button class="tbtn" onclick="sendCAD()">⌘ Send Ctrl+Alt+Del</button>
    <button class="tbtn" onclick="fullscreen()">⛶ Fullscreen</button>
    <button class="tbtn danger" onclick="window.close()">✕ Disconnect</button>
  </div>

  <div class="stage">
    <div class="screen">
      <div class="term" id="term"></div>
      <div class="overlay-off" id="offscreen" style="display:none">
        <div>
          <div class="big">⚠ VM is powered off</div>
          <div class="small">Start the VM from the portal to open a console session.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="sb-res">1024 × 640</span>
    <span id="sb-enc">Encoding: Tight + JPEG</span>
    <span id="sb-lat">RTT: 2 ms</span>
    <span id="sb-proto">noVNC 1.4 · WebSocket</span>
    <span style="margin-left:auto" id="sb-vm"></span>
  </div>

<script>
  const q = new URLSearchParams(location.search);
  const vm = {
    name: q.get('name') || 'vm-instance',
    id: q.get('id') || 'VM-0000',
    ip: q.get('ip') || '203.81.64.10',
    os: q.get('os') || 'Ubuntu 22.04 LTS',
    vcpu: q.get('vcpu') || '4',
    ram: q.get('ram') || '16',
    storage: q.get('storage') || '200',
    running: q.get('running') !== '0',
  };
  document.getElementById('vmsub').textContent = vm.name + ' · ' + vm.ip;
  document.getElementById('sb-vm').textContent = vm.name + ' (' + vm.id + ')';
  document.title = 'VNC · ' + vm.name;

  const term = document.getElementById('term');
  const line = (cls, text) => { const d = document.createElement('div'); d.className = cls; d.textContent = text; term.appendChild(d); term.scrollTop = term.scrollHeight; };

  if (!vm.running) {
    document.getElementById('offscreen').style.display = 'grid';
    document.getElementById('statusdot').style.background = '#ff8087';
    document.getElementById('statusdot').style.boxShadow = 'none';
    document.getElementById('statustext').textContent = 'Powered off';
  } else {
    const boot = [
      ['sys', 'Initializing noVNC session…'],
      ['sys', 'Negotiating RFB 003.008 protocol…'],
      ['ok',  'Connected to ' + vm.ip + ':5901 (Tight encoding)'],
      ['out', ''],
      ['login-banner', vm.os + ' (GNU/Linux 5.15.0-92-generic x86_64)'],
      ['login-banner', ''],
      ['login-banner', '  System load:  0.42              Processes:           128'],
      ['login-banner', '  Usage of /:   42% of ' + vm.storage + 'GB    Users logged in:     1'],
      ['login-banner', '  Memory usage: 68% of ' + vm.ram + 'GB     IPv4 address:        ' + vm.ip],
      ['login-banner', '  CPU cores:    ' + vm.vcpu],
      ['out', ''],
      ['sys', 'Last login: ' + new Date(Date.now()-86400000).toUTCString() + ' from 203.81.64.10'],
      ['out', ''],
    ];
    let i = 0;
    const tick = () => {
      if (i < boot.length) { line(boot[i][0], boot[i][1]); i++; setTimeout(tick, 90); }
      else prompt();
    };
    setTimeout(tick, 300);
  }

  function prompt() {
    const row = document.createElement('div');
    row.className = 'prompt-row';
    row.innerHTML = '<span class="prompt">root@' + vm.name + ':~#</span>';
    const input = document.createElement('input');
    input.className = 'cmdinput';
    input.autofocus = true;
    row.appendChild(input);
    term.appendChild(row);
    input.focus();
    term.scrollTop = term.scrollHeight;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const c = input.value.trim();
        input.disabled = true;
        row.innerHTML = '<span class="prompt">root@' + vm.name + ':~#</span> <span class="cmd">' + c + '</span>';
        run(c);
        prompt();
      }
    });
  }

  function run(c) {
    const R = {
      ls: 'app  backups  logs  public_html  scripts',
      pwd: '/root',
      whoami: 'root',
      uptime: ' ' + new Date().toTimeString().slice(0,8) + ' up 42 days,  3:14,  1 user,  load average: 0.42, 0.38, 0.31',
      'df -h': 'Filesystem  Size  Used Avail Use%\n/dev/vda1   ' + vm.storage + 'G  ' + Math.round(vm.storage*.42) + 'G  ' + Math.round(vm.storage*.58) + 'G  42% /',
      'free -m': '       total    used    free\nMem:  ' + (vm.ram*1024) + '   ' + Math.round(vm.ram*1024*.68) + '   ' + Math.round(vm.ram*1024*.32),
      nproc: vm.vcpu,
      'uname -a': 'Linux ' + vm.name + ' 5.15.0-92-generic #102-Ubuntu SMP x86_64 GNU/Linux',
      'cat /etc/os-release': 'PRETTY_NAME="' + vm.os + '"',
      help: 'Available: ls, pwd, whoami, uptime, df -h, free -m, nproc, uname -a, clear, help',
      clear: '__CLEAR__',
      '': '',
    };
    let out = R[c];
    if (out === '__CLEAR__') { term.innerHTML = ''; return; }
    if (c === '') return;
    if (out === undefined) out = c.split(' ')[0] + ': command not found';
    out.split('\n').forEach(t => line('out', t));
  }

  function sendCAD() { line('warn', '* Sent Ctrl+Alt+Del to ' + vm.name); }
  function fullscreen() { document.documentElement.requestFullscreen?.(); }

  // Live RTT jitter
  setInterval(() => { document.getElementById('sb-lat').textContent = 'RTT: ' + (1 + Math.floor(Math.random()*4)) + ' ms'; }, 2000);
</script>
</body>
</html>
